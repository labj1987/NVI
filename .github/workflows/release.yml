name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install GTK4 and System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev pkg-config libssl-dev wget

      - name: Set up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build AppImage
        run: |
          # Run the script without sudo to let Cargo use the standard user home directory
          bash build-appimage.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: nvidia-driver-installer-*-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
