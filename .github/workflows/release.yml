name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cargo rustc libgtk-4-dev libadwaita-1-dev pkg-config libssl-dev wget

      - name: Build AppImage
        run: |
          sudo bash build-appimage.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: nvidia-driver-installer-*-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
