name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install GTK4 and System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev pkg-config libssl-dev wget libfuse2t64

      - name: Set up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build Production Release Binary
        run: |
          cargo build --release

      - name: Package AppImage Manually
        run: |
          # 1. Download official appimagetool deployment utility
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

          # 2. Replicate structure required for AppImage packaging
          mkdir -p AppDir/usr/bin
          cp target/release/nvidia-driver-installer AppDir/usr/bin/
          
          # 3. Copy necessary desktop integration metadata from repo assets
          cp data/nvidia-driver-installer.desktop AppDir/
          cp data/com.lordnikon.nvidia-driver-installer.policy AppDir/
          
          # 4. Use a fallback icon for the AppImage metadata bundle framework
          touch AppDir/nvidia-driver-installer.png
          
          # 5. Create basic runtime entrypoint script inside the bundle
          cat << 'EOF' > AppDir/AppRun
          #!/bin/sh
          SELF=$(dirname "$(readlink -f "$0")")
          exec "$SELF/usr/bin/nvidia-driver-installer" "$@"
          EOF
          chmod +x AppDir/AppRun

          # 6. Build the final signed artifact container binary package
          ./appimagetool-x86_64.AppImage AppDir nvidia-driver-installer-2.4.0-x86_64.AppImage

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: nvidia-driver-installer-*-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
